<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Noresult To-Do</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Noresult To-Do</h1>
      <p id="groupInfo">Trykk «Hent neste» for å starte.</p>

      <div class="actions top-actions">
        <button id="fetchNextBtn">Hent neste</button>
        <button id="markAllBtn" disabled>Marker alle behandlet</button>
      </div>

      <table id="todoTable">
        <thead>
          <tr>
            <th>Term</th>
            <th>Elnummer</th>
            <th>Behandlet</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <div class="actions">
        <button id="completeBtn" disabled>Fullfør</button>
      </div>

      <p id="status"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
